name: security
description: >
  Two-phase security scanning. Phase 1 (source): package vulns + license
  compliance + static analysis. Phase 2 (image): container image vuln scan.
  Target determines the phase - dir:. for source, docker:<ref> for image.
  Posts and maintains a single PR comment with results from both phases.

inputs:
  target:
    description: >
      Syft scan target. "dir:." scans source packages (default).
      "docker:<image>" scans a built container image.
    required: false
    default: "dir:."
  packages:
    description: Run vulnerability scan via grype
    required: false
    default: "true"
  licenses:
    description: >
      Run license compliance scan via grant - informational only, never blocks.
      Only applies when target is dir:.
    required: false
    default: "true"
  code:
    description: >
      Run static code analysis via opengrep.
      Only applies when target is dir:.
    required: false
    default: "true"
  severity:
    description: Minimum severity to fail on (CRITICAL, HIGH, MEDIUM, LOW)
    required: false
    default: HIGH
  max-vuln-findings:
    description: Max vulnerability findings to show in the PR comment per scan (grype)
    required: false
    default: "20"
  max-code-findings:
    description: Max code analysis findings to show in the PR comment (opengrep)
    required: false
    default: "20"
  max-license-findings:
    description: Max license findings to show in the PR comment (grant)
    required: false
    default: "20"
  block-on-packages:
    description: Fail the workflow if vulnerability scan finds issues at or above severity threshold
    required: false
    default: "true"
  block-on-code:
    description: Fail the workflow if code static analysis finds issues
    required: false
    default: "false"
  block-on-licenses:
    description: Fail the workflow if license scan finds issues
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Log scan configuration
      shell: bash
      run: |
        echo "Security scan:"
        echo "  target:   ${{ inputs.target }}"
        echo "  packages: ${{ inputs.packages }}"
        echo "  licenses: ${{ inputs.licenses }}"
        echo "  code:     ${{ inputs.code }}"
        echo "  severity: ${{ inputs.severity }}"

    - name: Install Anchore tools
      if: inputs.packages == 'true' || inputs.licenses == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/install-anchore.sh

    - name: Generate SBOM
      if: inputs.packages == 'true' || inputs.licenses == 'true'
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
      run: syft "$TARGET" -o spdx-json=sbom.spdx.json

    - name: Package vulnerability scan
      if: inputs.packages == 'true'
      id: grype
      continue-on-error: true
      shell: bash
      env:
        SEVERITY: ${{ inputs.severity }}
        RESULTS_FILE: ${{ inputs.target == 'dir:.' && 'grype-source-results.json' || 'grype-image-results.json' }}
      run: ${{ github.action_path }}/scripts/grype-scan.sh

    - name: License compliance scan
      if: inputs.licenses == 'true' && inputs.target == 'dir:.'
      shell: bash
      run: ${{ github.action_path }}/scripts/grant-scan.sh

    - name: Install opengrep
      if: inputs.code == 'true' && inputs.target == 'dir:.'
      shell: bash
      run: |
        curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
        echo "$HOME/.opengrep/cli/latest" >> "$GITHUB_PATH"

    - name: Code static analysis
      if: inputs.code == 'true' && inputs.target == 'dir:.'
      id: opengrep
      continue-on-error: true
      shell: bash
      env:
        SEVERITY: ${{ inputs.severity }}
      run: ${{ github.action_path }}/scripts/opengrep-scan.sh

    - name: Post security comment
      if: always() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SCAN_PHASE: ${{ inputs.target == 'dir:.' && 'source' || 'image' }}
        SEVERITY: ${{ inputs.severity }}
        PACKAGES: ${{ inputs.packages }}
        LICENSES: ${{ inputs.licenses }}
        MAX_VULN_FINDINGS: ${{ inputs.max-vuln-findings }}
        MAX_CODE_FINDINGS: ${{ inputs.max-code-findings }}
        MAX_LICENSE_FINDINGS: ${{ inputs.max-license-findings }}
        BLOCK_ON_PACKAGES: ${{ inputs.block-on-packages }}
        BLOCK_ON_CODE: ${{ inputs.block-on-code }}
        BLOCK_ON_LICENSES: ${{ inputs.block-on-licenses }}
      run: ${{ github.action_path }}/scripts/post-security-comment.sh

    - name: Fail on vulnerabilities
      if: steps.grype.outcome == 'failure' && inputs.block-on-packages == 'true'
      shell: bash
      run: |
        echo "::error::Vulnerability scan found ${{ inputs.severity }}-or-higher issues - see PR comment for details"
        exit 1

    - name: Fail on code issues
      if: steps.opengrep.outcome == 'failure' && inputs.block-on-code == 'true'
      shell: bash
      run: |
        echo "::error::Code scan found issues - see PR comment for details"
        exit 1

    - name: Fail on license issues
      if: inputs.block-on-licenses == 'true' && inputs.licenses == 'true' && inputs.target == 'dir:.'
      shell: bash
      run: |
        if [ -f grant-results.json ]; then
          high=$(jq '[.[] | select(.risk == "High")] | length' grant-results.json 2>/dev/null || echo 0)
          if [ "$high" -gt 0 ]; then
            echo "::error::License scan found high-risk (strong copyleft) licenses - see PR comment for details"
            exit 1
          fi
        fi
