name: Pull Request

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Source Security Scan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/security

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 22.*
        cache: 'npm'

    - name: Install dependencies
      run: make build

    - name: Get Playwright version
      run: echo "PLAYWRIGHT_VERSION=$(jq -r '.devDependencies["@playwright/test"]' package.json | sed 's/^[^0-9]*//')" >> "$GITHUB_ENV"

    - name: Cache Playwright browsers
      uses: actions/cache@v5
      id: pw-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

    - name: Install Playwright system deps
      run: npx playwright install-deps

    - name: Install Playwright Browsers
      if: steps.pw-cache.outputs.cache-hit != 'true'
      run: npx playwright install

    - name: Run Playwright tests
      env:
        NEXT_PUBLIC_PUBLICSQUARE_KEY: ${{ vars.NEXT_PUBLIC_PUBLICSQUARE_KEY }}
      run: make acceptance-test

    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
